<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Step Sequencer · Audiorective Showroom</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        height: 100%;
        background: #0a0a0a;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        color: #e0e0e0;
      }
      .showroom-back {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 1000;
        padding: 4px 10px;
        font-size: 12px;
        font-family: inherit;
        color: #cfcfcf;
        text-decoration: none;
        background: rgba(10, 10, 12, 0.7);
        border: 1px solid #2a2a2a;
        border-radius: 4px;
        backdrop-filter: blur(6px);
      }
      .showroom-back:hover {
        border-color: #444;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <a class="showroom-back" href="/">← Showroom</a>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
