name: playcanvas-compat

# Periodic PlayCanvas compatibility guard. Independent of PR/push CI so that an
# upstream release (or a regression in an older supported version) never
# red-lights unrelated PRs. Two jobs:
#   1. compat-test — run the playcanvas package's tests against every version
#      in compat.json's `tested` list.
#   2. new-version-check — flag any npm release newer than compat.latestKnown,
#      fail, and open/refresh a tracking issue.
#
# The per-PR `ci.yml` already exercises the package against the lockfile-pinned
# version; this workflow adds the multi-version sweep + drift detection.

on:
  schedule:
    - cron: "17 6 * * *" # daily, 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  matrix-source:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.read.outputs.versions }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        run: echo "versions=$(node -e "console.log(JSON.stringify(require('./packages/playcanvas/compat.json').tested))")" >> "$GITHUB_OUTPUT"

  compat-test:
    needs: matrix-source
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        playcanvas: ${{ fromJSON(needs.matrix-source.outputs.versions) }}
    name: compat-test (${{ matrix.playcanvas }})
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Pin playcanvas to the matrix version via pnpm.overrides at the root
      # package.json, then install.
      - name: Pin playcanvas via pnpm.overrides
        run: |
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); p.pnpm = p.pnpm || {}; p.pnpm.overrides = p.pnpm.overrides || {}; p.pnpm.overrides.playcanvas = process.env.PC_VERSION; fs.writeFileSync('package.json', JSON.stringify(p, null, 2));"
        env:
          PC_VERSION: ${{ matrix.playcanvas }}

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm --filter @audiorective/core exec playwright install --with-deps chromium

      - run: pnpm -r run build

      - run: pnpm --filter @audiorective/playcanvas run typecheck

      - run: pnpm --filter @audiorective/playcanvas run test -- --run

  new-version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Compare npm latest vs compat.json
        id: compare
        run: |
          set -euo pipefail
          NPM_LATEST=$(npm view playcanvas versions --json | node -e "let s=''; process.stdin.on('data',c=>s+=c).on('end',()=>{const v=JSON.parse(s).filter(x=>!x.includes('-')); console.log(v[v.length-1]);})")
          KNOWN=$(node -e "console.log(require('./packages/playcanvas/compat.json').latestKnown)")
          echo "npm_latest=$NPM_LATEST" >> "$GITHUB_OUTPUT"
          echo "compat_latest=$KNOWN" >> "$GITHUB_OUTPUT"
          if [ "$NPM_LATEST" != "$KNOWN" ]; then
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "::error::PlayCanvas $NPM_LATEST released, not in compat.json (latestKnown=$KNOWN). Verify locally and update packages/playcanvas/compat.json."
          else
            echo "drift=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure tracking issue exists
        if: steps.compare.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_LATEST: ${{ steps.compare.outputs.npm_latest }}
          COMPAT_LATEST: ${{ steps.compare.outputs.compat_latest }}
        run: |
          set -euo pipefail
          TITLE="playcanvas $NPM_LATEST released — verify and update compat.json"
          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          BODY=$(cat <<EOF
          Upstream npm has published \`playcanvas@$NPM_LATEST\`. \`packages/playcanvas/compat.json\` still pins \`latestKnown\` to \`$COMPAT_LATEST\`.

          Action items:
          1. Run \`pnpm install\` locally with \`pnpm.overrides.playcanvas\` set to \`$NPM_LATEST\`.
          2. Run \`pnpm --filter @audiorective/playcanvas run typecheck build test\`.
          3. Smoke-test \`apps/showroom\` Spatial Music Room (PlayCanvas) demo.
          4. If green, append \`$NPM_LATEST\` to \`compat.tested\` and bump \`latestKnown\`.
          EOF
          )
          if [ -z "$EXISTING" ]; then
            gh issue create --title "$TITLE" --body "$BODY" --label "dependency" || gh issue create --title "$TITLE" --body "$BODY"
          else
            echo "Tracking issue #$EXISTING already open."
          fi

      - name: Fail if drift detected
        if: steps.compare.outputs.drift == 'true'
        run: exit 1
